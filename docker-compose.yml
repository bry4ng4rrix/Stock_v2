version: '3.8'

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: stock_backend
    environment:
      DJANGO_SETTINGS_MODULE: Stock.settings
      DEBUG: "True"
      ALLOWED_HOSTS: "157.173.103.147 localhost 127.0.0.1 0.0.0.0"
      DB_ENGINE: "django.db.backends.sqlite3"
      CORS_ALLOWED_ORIGINS: "http://157.173.103.147:3000 http://localhost:3000"
      CSRF_TRUSTED_ORIGINS: "http://157.173.103.147 http://157.173.103.147:3000 http://157.173.103.147:8000 http://localhost"
    command: daphne -b 0.0.0.0 -p 8000 Stock.asgi:application
    volumes:
      - .:/app    
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: stock_frontend
    working_dir: /app/frontend
    environment:
      NEXT_PUBLIC_API_URL: "http://157.173.103.147:8000/api"
      NEXT_PUBLIC_DJANGO_API_URL: "http://157.173.103.147:8000/api"
    command: sh -c "npm install && npm run build && npm start"
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
