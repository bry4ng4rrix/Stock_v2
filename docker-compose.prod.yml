version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: stock_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-stock_db}
      POSTGRES_USER: ${DB_USER:-stock}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stock_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: stock_backend
    environment:
      DJANGO_SETTINGS_MODULE: Stock.settings
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost 127.0.0.1}
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.postgresql}
      DB_NAME: ${DB_NAME:-stock_db}
      DB_USER: ${DB_USER:-stock}
      DB_PASSWORD: ${DB_PASSWORD:-stock_password}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost}
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "Stock.asgi:application"]
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: stock_frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:
